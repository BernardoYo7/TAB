<html>
<head>
    <title>Metodo Tab</title>
</head>
<body>
    <script>
        function parseAIJson(data) {
            // Validation for alternativas array
            if (!Array.isArray(data.alternativas) || data.alternativas.length !== 5) {
                throw new Error('Alternativas must be an array of exactly 5 items.');
            }
            // Validation for gabarito
            if (typeof data.gabarito !== 'number' || data.gabarito < 0 || data.gabarito > 4) {
                throw new Error('Gabarito must be a number between 0 and 4.');
            }
            // Proceed with existing logic...
        }

        function responderQuestao(resposta, gabarito) {
            // Validation for gabarito bounds
            if (gabarito < 0 || gabarito > 4) {
                throw new Error('Gabarito must be between 0 and 4.');
            }
            // Handle response...
        }

        function renderQuestaoInterativa(data) {
            // Validation for required fields
            if (!data.pergunta || !data.alternativas || !data.gabarito) {
                throw new Error('Required fields are missing.');
            }
            // Proceed with rendering...
        }

        function handleAIResponse(response) {
            // Fallback values
            const defaultData = {
                alternativas: ['Option 1', 'Option 2', 'Option 3', 'Option 4', 'Option 5'],
                gabarito: 0,
                pergunta: 'Default Question?'
            };
            const data = response || defaultData;
            parseAIJson(data);
            renderQuestaoInterativa(data);
        }
    </script>
</body>
</html>
