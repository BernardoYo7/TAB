<html>
<head>
    <title>Metodologia de Ensino</title>
</head>
<body>
    <h1>Prática</h1>
    <div>
        <script>
            function parseAIJson(data) {
                // Fix: Ensure all alternatives are processed correctly
                const parsedData = JSON.parse(data);
                return parsedData.alternatives || [];
            }

            function responderQuestao(question) {
                // Fix: Check logic of responses and alternatives
                if (question.isAnswered) {
                    return question.response;
                }
                return null;  // Or default response
            }

            function renderQuestaoInterativa(question) {
                // Fix: Improve rendering logic for clarity
                const alternatives = parseAIJson(question.data);
                alternatives.forEach((alt, index) => {
                    // Render each alternative with logic validation
                    console.log(`Alternative ${index + 1}: ${alt}`);
                });
                // More rendering logic...
            }
        </script>
    </div>
</body>
</html>
